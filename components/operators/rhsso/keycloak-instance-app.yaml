apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-instance
  namespace: openshift-gitops
spec:
  destination:
    namespace: composer-ai-rhsso
    server: https://kubernetes.default.svc
  project: default
  source:
    path: components/operators/keycloak/instance/overlays/ocp-oidc-client
    repoURL: https://github.com/redhat-composer-ai/cluster-gitops.git
    targetRevision: keycloak
